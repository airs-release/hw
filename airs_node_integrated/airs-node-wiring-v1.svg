<svg viewBox="0 0 1020 880" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif" role="img" aria-labelledby="ttl desc">
<title id="ttl">AIRS 노드 배선도 — ESP32-C3 + PIR/mmWave/IR</title>
<desc id="desc">ESP32-C3에 HC-SR501 PIR, HLK-LD2410D mmWave, TSOP38238 IR 수신, TSAL6400 IR 송신(MOSFET 구동)을 연결하는 배선도.</desc>
<style>
  .box{fill:#fffdf8;stroke:#bcae9a;stroke-width:1.5;}
  .mcu{fill:#e4f0ee;stroke:#1f5f68;stroke-width:2;}
  .drv{fill:#f9f5ec;stroke:#986a1b;stroke-width:1.5;}
  .t{font-size:13px;fill:#2b2722;}
  .tb{font-size:14px;font-weight:700;fill:#2b2722;}
  .mono{font-family:'Consolas','JetBrains Mono',monospace;font-size:12px;fill:#2b2722;}
  .lbl{font-family:'Consolas',monospace;font-size:11px;}
  .pin{font-family:'Consolas',monospace;font-size:11.5px;fill:#1f5f68;font-weight:700;}
  .note{font-size:12px;fill:#756b5f;}
  .w5{stroke:#c0392b;stroke-width:2.5;fill:none;}
  .w3{stroke:#e67e22;stroke-width:2.5;fill:none;}
  .wg{stroke:#333;stroke-width:2.5;fill:none;}
  .ws{stroke:#1f5f68;stroke-width:2.5;fill:none;}
  .dot5{fill:#c0392b;} .dot3{fill:#e67e22;} .dotg{fill:#333;} .dots{fill:#1f5f68;}
</style>
<rect x="0" y="0" width="1020" height="880" fill="#f4f1ea"/>
<text x="30" y="34" class="tb" font-size="20">AIRS 노드 배선도 — ESP32-C3</text>
<text x="30" y="54" class="note">HC-SR501(PIR) · HLK-LD2410D(mmWave) · TSOP38238(IR 수신) · TSAL6400(IR 송신, MOSFET) · Wi-Fi RSSI</text>

<!-- POWER RAILS -->
<line x1="120" y1="100" x2="915" y2="100" class="w5"/>
<text x="30" y="104" class="pin" fill="#c0392b">5V rail</text>
<text x="922" y="104" class="note">보드 5V/VBUS(USB)</text>
<line x1="120" y1="700" x2="915" y2="700" class="wg"/>
<text x="30" y="704" class="pin" fill="#333">GND rail</text>
<text x="922" y="704" class="note">공통 GND</text>

<!-- ESP32-C3 (center) -->
<rect x="420" y="250" width="180" height="330" rx="4" class="mcu"/>
<text x="510" y="285" text-anchor="middle" class="tb" fill="#1f5f68">ESP32-C3</text>
<text x="510" y="303" text-anchor="middle" class="note">DevKitM-1 / SuperMini</text>
<text x="510" y="470" text-anchor="middle" class="lbl" fill="#756b5f">사용중:</text>
<text x="510" y="486" text-anchor="middle" class="lbl" fill="#756b5f">GPIO4=DHT22</text>
<text x="510" y="500" text-anchor="middle" class="lbl" fill="#756b5f">GPIO5/6=I2C(SCD41)</text>
<!-- MCU pins left -->
<text x="415" y="333" text-anchor="end" class="pin">GPIO3</text>
<text x="415" y="360" text-anchor="end" class="pin">GPIO1</text>
<text x="415" y="404" text-anchor="end" class="pin">3V3</text>
<!-- MCU pins right -->
<text x="605" y="333" class="pin">GPIO10</text>
<text x="605" y="360" class="pin">GPIO7</text>
<!-- MCU top 5V, bottom GND -->
<text x="470" y="245" text-anchor="middle" class="pin">5V</text>
<text x="470" y="597" text-anchor="middle" class="pin">GND</text>
<line x1="470" y1="250" x2="470" y2="100" class="w5"/><circle cx="470" cy="100" r="3.5" class="dot5"/>
<line x1="470" y1="580" x2="470" y2="700" class="wg"/><circle cx="470" cy="700" r="3.5" class="dotg"/>

<!-- ===== PIR HC-SR501 (top-left) ===== -->
<rect x="70" y="150" width="180" height="90" rx="4" class="box"/>
<text x="160" y="180" text-anchor="middle" class="tb">HC-SR501</text>
<text x="160" y="198" text-anchor="middle" class="note">PIR · 움직임 감지</text>
<text x="160" y="222" text-anchor="middle" class="lbl" fill="#756b5f">VCC=5V · OUT 3.3V TTL</text>
<!-- PIR VCC->5V, GND->GND, OUT->GPIO3 -->
<line x1="110" y1="150" x2="110" y2="100" class="w5"/><circle cx="110" cy="100" r="3.5" class="dot5"/>
<text x="90" y="140" class="lbl" fill="#c0392b">VCC</text>
<line x1="210" y1="150" x2="210" y2="130" class="wg"/><line x1="210" y1="130" x2="360" y2="130" class="wg"/><line x1="360" y1="130" x2="360" y2="700" class="wg"/><circle cx="360" cy="700" r="3.5" class="dotg"/>
<text x="216" y="146" class="lbl" fill="#333">GND</text>
<line x1="250" y1="215" x2="335" y2="215" class="ws"/><line x1="335" y1="215" x2="335" y2="328" class="ws"/><line x1="335" y1="328" x2="420" y2="328" class="ws"/><circle cx="420" cy="328" r="3.5" class="dots"/>
<text x="258" y="211" class="lbl" fill="#1f5f68">OUT → GPIO3</text>

<!-- ===== TSOP38238 (mid-left, IR receive) ===== -->
<rect x="70" y="380" width="180" height="110" rx="4" class="box"/>
<text x="160" y="410" text-anchor="middle" class="tb">TSOP38238</text>
<text x="160" y="428" text-anchor="middle" class="note">IR 수신 · 리모컨 학습</text>
<text x="160" y="452" text-anchor="middle" class="lbl" fill="#756b5f">VCC=3.3V · 38kHz</text>
<text x="160" y="470" text-anchor="middle" class="lbl" fill="#a4433b">VCC에 100Ω+4.7µF, 0.1µF 디커플링</text>
<!-- TSOP VCC->3V3(MCU), GND->GND, OUT->GPIO1 -->
<line x1="110" y1="380" x2="110" y2="404" class="w3"/><line x1="110" y1="404" x2="410" y2="404" class="w3"/><circle cx="410" cy="404" r="3.5" class="dot3"/>
<text x="86" y="376" class="lbl" fill="#e67e22">VCC→3V3</text>
<line x1="200" y1="490" x2="200" y2="700" class="wg"/><circle cx="200" cy="700" r="3.5" class="dotg"/>
<text x="206" y="510" class="lbl" fill="#333">GND</text>
<line x1="250" y1="430" x2="380" y2="430" class="ws"/><line x1="380" y1="430" x2="380" y2="356" class="ws"/><line x1="380" y1="356" x2="420" y2="356" class="ws"/><circle cx="420" cy="356" r="3.5" class="dots"/>
<text x="256" y="426" class="lbl" fill="#1f5f68">OUT → GPIO1</text>

<!-- ===== HLK-LD2410D (top-right, mmWave) ===== -->
<rect x="760" y="150" width="185" height="105" rx="4" class="box"/>
<text x="852" y="180" text-anchor="middle" class="tb">HLK-LD2410D</text>
<text x="852" y="198" text-anchor="middle" class="note">mmWave · 정지 인원 재실</text>
<text x="852" y="222" text-anchor="middle" class="lbl" fill="#756b5f">VCC=5V · OUT HIGH=재실</text>
<text x="852" y="240" text-anchor="middle" class="lbl" fill="#756b5f">(상세 데이터는 UART TX/RX 옵션)</text>
<line x1="890" y1="150" x2="890" y2="100" class="w5"/><circle cx="890" cy="100" r="3.5" class="dot5"/>
<text x="866" y="140" class="lbl" fill="#c0392b">VCC</text>
<line x1="810" y1="150" x2="810" y2="120" class="wg"/><line x1="810" y1="120" x2="700" y2="120" class="wg"/><line x1="700" y1="120" x2="700" y2="700" class="wg"/><circle cx="700" cy="700" r="3.5" class="dotg"/>
<text x="770" y="140" class="lbl" fill="#333">GND</text>
<line x1="760" y1="230" x2="655" y2="230" class="ws"/><line x1="655" y1="230" x2="655" y2="300" class="ws"/><line x1="655" y1="300" x2="600" y2="300" class="ws"/><circle cx="600" cy="300" r="3.5" class="dots"/>
<text x="612" y="290" class="lbl" fill="#1f5f68">OUT → GPIO10</text>

<!-- ===== IR 송신 드라이버 (bottom-right) ===== -->
<rect x="690" y="360" width="255" height="235" rx="4" class="drv"/>
<text x="817" y="386" text-anchor="middle" class="tb" fill="#986a1b">IR 송신 드라이버 (TSAL6400 ×2)</text>
<!-- GPIO7 -> 100R -> gate -->
<line x1="600" y1="345" x2="640" y2="345" class="ws"/><line x1="640" y1="345" x2="640" y2="440" class="ws"/><line x1="640" y1="440" x2="705" y2="440" class="ws"/>
<text x="602" y="338" class="lbl" fill="#1f5f68">GPIO7</text>
<rect x="705" y="432" width="34" height="16" fill="#fff" stroke="#986a1b"/><text x="722" y="444" text-anchor="middle" class="lbl">100Ω</text>
<!-- MOSFET symbol (simplified box) -->
<rect x="748" y="410" width="70" height="60" fill="#fff" stroke="#333"/>
<text x="783" y="435" text-anchor="middle" class="lbl">N-MOSFET</text>
<text x="783" y="452" text-anchor="middle" class="lbl">AO3400</text>
<text x="742" y="444" text-anchor="end" class="lbl">G</text>
<text x="783" y="405" text-anchor="middle" class="lbl">D</text>
<text x="783" y="484" text-anchor="middle" class="lbl">S</text>
<line x1="739" y1="440" x2="748" y2="440" class="ws"/>
<!-- gate pulldown 10k to GND -->
<line x1="722" y1="448" x2="722" y2="520" class="wg"/><rect x="705" y="475" width="34" height="15" fill="#fff" stroke="#333"/><text x="722" y="487" text-anchor="middle" class="lbl">10kΩ</text>
<line x1="722" y1="520" x2="640" y2="520" class="wg"/><line x1="640" y1="520" x2="640" y2="700" class="wg"/><circle cx="640" cy="700" r="3.5" class="dotg"/>
<!-- source to GND -->
<line x1="783" y1="470" x2="783" y2="545" class="wg"/><line x1="783" y1="545" x2="760" y2="545" class="wg"/><line x1="760" y1="545" x2="760" y2="700" class="wg"/><circle cx="760" cy="700" r="3.5" class="dotg"/>
<text x="788" y="512" class="lbl" fill="#333">S→GND</text>
<!-- drain to LED cathodes -->
<line x1="783" y1="410" x2="783" y2="340" class="wg"/><line x1="783" y1="340" x2="905" y2="340" class="wg"/>
<text x="792" y="400" class="lbl">D→캐소드</text>
<!-- two LEDs: anode via 33R to 5V -->
<circle cx="855" cy="345" r="6" fill="none" stroke="#333"/><circle cx="885" cy="345" r="6" fill="none" stroke="#333"/>
<text x="825" y="365" class="lbl">TSAL6400 ×2</text>
<rect x="853" y="300" width="16" height="30" fill="#fff" stroke="#c0392b"/><text x="838" y="318" class="lbl" fill="#c0392b">33Ω</text>
<rect x="877" y="300" width="16" height="30" fill="#fff" stroke="#c0392b"/>
<line x1="855" y1="339" x2="855" y2="330" class="w5"/><line x1="885" y1="339" x2="885" y2="330" class="w5"/>
<line x1="861" y1="300" x2="861" y2="100" class="w5"/><circle cx="861" cy="100" r="3.5" class="dot5"/>
<line x1="885" y1="300" x2="885" y2="290" class="w5"/><line x1="885" y1="290" x2="861" y2="290" class="w5"/>
<text x="900" y="318" class="lbl" fill="#c0392b">→5V</text>

<!-- ===== PIN MAP TABLE ===== -->
<text x="30" y="748" class="tb">핀 맵</text>
<g class="mono">
<text x="30" y="770">GPIO3  ← HC-SR501 PIR OUT        (입력)</text>
<text x="30" y="789">GPIO10 ← HLK-LD2410D OUT (재실)  (입력)</text>
<text x="30" y="808">GPIO1  ← TSOP38238 OUT (IR 수신) (입력)</text>
<text x="30" y="827">GPIO7  → MOSFET 게이트 (IR 송신) (출력)</text>
<text x="30" y="846" fill="#756b5f">GPIO4=DHT22, GPIO5/6=I2C(SCD41) · 부트스트랩 2/8/9 회피</text>
</g>
<!-- legend + notes -->
<text x="560" y="748" class="tb">범례 · 주의</text>
<line x1="560" y1="762" x2="588" y2="762" class="w5"/><text x="594" y="766" class="note">5V</text>
<line x1="620" y1="762" x2="648" y2="762" class="w3"/><text x="654" y="766" class="note">3.3V</text>
<line x1="690" y1="762" x2="718" y2="762" class="wg"/><text x="724" y="766" class="note">GND</text>
<line x1="760" y1="762" x2="788" y2="762" class="ws"/><text x="794" y="766" class="note">신호(GPIO)</text>
<g class="note">
<text x="560" y="788">• IR LED는 GPIO 직접구동 금지 → MOSFET 경유. 33Ω은 밝기↑ 원하면 22Ω.</text>
<text x="560" y="806">• LD2410D 5핀은 1.25mm 커넥터. 재실만 쓰면 OUT핀, 상세값은 UART.</text>
<text x="560" y="824">• TSOP38238 VCC에 100Ω+4.7µF+0.1µF 디커플링(오작동 방지).</text>
<text x="560" y="842" fill="#a4433b">• 라이브러리 "IRremoteESP8266" 설치 · Partition = Huge APP.</text>
</g>
</svg>
